<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Felicidades! - Fin del Juego</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: #001f3f;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Comic Sans MS', sans-serif;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal" style="text-align: center; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); border: 5px solid red; max-width: 600px; width: 90%;">
        
        <div style="font-size: 3rem; margin-bottom: 10px;">⭐ ⭐ ⭐</div>
        
        <h1 style="color: red; font-size: 2.5rem; margin-bottom: 15px; font-weight: bold;">¡LO LOGRASTE!</h1>
        
        <h2 style="color: #1a4a9e; font-size: 1.8rem; margin-bottom: 25px;">¡Felicidades, completaste todos los juegos!</h2>
        
        <div style="background: #e63946; color: white; font-size: 1.6rem; padding: 15px 30px; border-radius: 50px; display: inline-block; font-weight: bold; margin-bottom: 30px; box-shadow: 0 4px 0 #b82153;">
            🏆 Puntaje Total: <span id="puntaje-final">0</span> Pts
        </div>
        
        <p style="color: #4a5568; font-size: 1.1rem; line-height: 1.6; margin-bottom: 35px;">
            Has demostrado excelentes habilidades matemáticas en el laboratorio.<br>
            ¡Buen trabajo ordenando valores y calculando en la caja!
        </p>

        <div>
            <button onclick="regresarAlInicio()" style="background: #20c997; color: white; font-size: 1.4rem; padding: 15px 35px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #179c73; transition: transform 0.1s;">
                ➡️ Volver al Inicio
            </button>
        </div>
    </div>

    <script>
        // Función dedicada a hablar el mensaje de felicitación
        function hablarFelicitacion(texto) {
            window.speechSynthesis.cancel(); // Detiene cualquier audio previo
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-MX'; // Configuración de idioma español
            msg.rate = 0.9;     // Velocidad amigable para niños
            msg.pitch = 1.1;    // Tono un poquito más agudo para que suene alegre
            window.speechSynthesis.speak(msg);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Recogemos el puntaje real de la partida
            const puntajeFinal = localStorage.getItem('puntajeGlobal') || '790';
            const txtPuntaje = document.getElementById('puntaje-final');
            if (txtPuntaje) {
                txtPuntaje.innerText = puntajeFinal;
            }

            // Lanzamiento de confeti
            if (typeof confetti === 'function') {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            }

            // Activamos la voz automática con retraso de medio segundo para dar impacto
            setTimeout(() => {
                hablarFelicitacion("¡Lo lograste! ¡Felicidades, completaste todos los juegos! ¡Eres un experto en matemáticas!");
            }, 500);
        });

        // Función para regresar al inicio y resetear la puntuación
        function regresarAlInicio() {
            localStorage.setItem('puntajeGlobal', '0'); 
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
