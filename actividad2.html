<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 2 - educafg</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/stylejuego.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="marcador-puntos-superior">
        ❤️ <span id="marcador-pts">0 Pts</span>
    </div>

    <div class="contenedor">
        <h1 id="texto-karaoke" class="titulo-voz" style="cursor: pointer;">
            <span class="palabra-normal">Ordena</span>
            <span class="palabra-normal">estos</span>
            <span class="palabra-normal">precios</span>
            <span class="palabra-normal">de</span>
            <span class="palabra-normal">cuatro</span>
            <span class="palabra-normal">cifras</span>
            <span class="palabra-normal">en</span>
            <span class="palabra-normal">la</span>
            <span class="palabra-normal">línea.</span>
        </h1>
        
        <div id="linea-tiempo"></div>
        
        <p style="font-weight: bold; color: #1a4a9e; font-family: sans-serif; text-align: center;">
            Pon todos los números en la línea. ¡Al completarla sabrás si tu secuencia es correcta!
        </p>
        
        <div id="numeros-disponibles"></div>

        <br>
        <div style="display: flex; gap: 15px; justify-content: center; align-items: center; margin-top: 10px;">
            <button id="btnSig" style="display: none; background: #51cf66; font-size: 1.3rem; padding: 12px 25px; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #3b944c;" onclick="window.location.href='actividad3.html'">
                Ir al Almacén ➡️
            </button>
        </div>
    </div>

    <script src="js/juego2.js"></script>
</body>
</html>
