<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego 3 - El Almacén</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/stylejuego2.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    
    <div class="marcador-puntos-superior">
        ❤️ <span id="marcador-pts">0 Pts</span>
    </div>

    <div class="contenedor-principal">
        <h1 id="texto-karaoke" class="titulo-voz" style="cursor: pointer;">
            <span class="palabra-normal">¡Busquemos</span>
            <span class="palabra-normal">la</span>
            <span class="palabra-normal">mochila</span>
            <span class="palabra-normal">en</span>
            <span class="palabra-normal">el</span>
            <span class="palabra-normal">almacén!</span>
            <span class="palabra-normal">Su</span>
            <span class="palabra-normal">precio</span>
            <span class="palabra-normal">es</span>
            <span class="palabra-normal">de</span>
            <span class="palabra-normal">cinco</span>
            <span class="palabra-normal">mil</span>
            <span class="palabra-normal">quinientos</span>
            <span class="palabra-normal">pesos.</span>
        </h1>

        <div class="escenario-almacen" style="position: relative; width: 100%; max-width: 700px; margin: 0 auto; overflow: visible;">
            
            <svg viewBox="0 0 800 600" class="imagen-fondo-almacen" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: auto; display: block;">
                <rect width="800" height="600" fill="#f4ebe1"/>
                <rect y="480" width="800" height="120" fill="#d7b995"/> 
                <rect y="465" width="800" height="15" fill="#be9c74"/> 
                <rect x="80" y="150" width="640" height="20" fill="#7a4b26" rx="3"/>
                <rect x="80" y="310" width="640" height="20" fill="#7a4b26" rx="3"/>
                <rect x="80" y="465" width="640" height="20" fill="#7a4b26" rx="3"/>
                <rect x="120" y="150" width="15" height="330" fill="#5c3619"/>
                <rect x="665" y="150" width="15" height="330" fill="#5c3619"/>

                <path d="M 160 170 L 160 250 L 195 250 L 195 170 Z" fill="#2b6cb0"/>
                <path d="M 198 170 L 198 250 L 233 250 L 233 170 Z" fill="#c53030"/>
                <path d="M 236 170 L 236 250 L 271 250 L 271 170 Z" fill="#2f855a"/>
                <rect x="170" y="185" width="15" height="25" fill="#ffffff" rx="2"/>
                <rect x="208" y="185" width="15" height="25" fill="#ffffff" rx="2"/>
                <rect x="246" y="185" width="15" height="25" fill="#ffffff" rx="2"/>

                <rect x="500" y="210" width="130" height="12" fill="#4299e1" rx="2"/>
                <rect x="510" y="222" width="130" height="12" fill="#ed64a6" rx="2"/>
                <rect x="495" y="234" width="135" height="12" fill="#ecc94b" rx="2"/>
                <rect x="505" y="246" width="125" height="12" fill="#48bb78" rx="2"/>
                <rect x="495" y="210" width="6" height="48" fill="#cbd5e0"/>

                <rect x="140" y="375" width="150" height="90" fill="#e2e8f0" rx="8" stroke="#cbd5e0" stroke-width="2"/>
                <rect x="155" y="395" width="40" height="55" fill="#319795" rx="4"/>
                <rect x="205" y="395" width="70" height="55" fill="#dd6b20" rx="4"/>

                <rect x="470" y="360" width="80" height="105" fill="#f7fafc" stroke="#e2e8f0" stroke-width="3"/>
                <rect x="565" y="385" width="95" height="80" fill="#6b46c1" rx="5"/>
                <circle cx="612" cy="425" r="18" fill="#a855f7" opacity="0.6"/>

                <g id="mochila-escolar" style="cursor: pointer;">
                    <path d="M 370 180 Q 400 135 430 180" fill="none" stroke="#b82153" stroke-width="12" stroke-linecap="round"/>
                    <path d="M 370 180 Q 400 135 430 180" fill="none" stroke="#e63970" stroke-width="6" stroke-linecap="round"/>
                    
                    <rect x="335" y="170" width="130" height="140" fill="#e63970" rx="35"/>
                    <path d="M 335 240 A 65 65 0 0 0 465 240 L 465 285 A 20 20 0 0 1 445 305 L 355 305 A 20 20 0 0 1 335 285 Z" fill="#c91a54"/>
                    
                    <rect x="355" y="225" width="90" height="75" fill="#ff6097" rx="18" stroke="#b82153" stroke-width="2"/>
                    
                    <path d="M 345 195 Q 400 185 455 195" fill="none" stroke="#4a5568" stroke-width="4" stroke-dasharray="4,3"/>
                    <path d="M 363 240 L 437 240" fill="none" stroke="#4a5568" stroke-width="3" stroke-dasharray="4,2"/>
                    
                    <polygon points="375,255 378,262 385,263 380,268 381,275 375,271 369,275 370,268 365,263 372,262" fill="#ecc94b"/>
                </g>
            </svg>
            
            <div id="zona-mochila" class="zona-pulsable" onclick="abrirMenuPrecios(event)" style="position: absolute; top: 22%; left: 41%; width: 18%; height: 30%; cursor: pointer; z-index: 10;"></div>

            <div id="pop-precios" class="popover-precios style-hidden" style="position: absolute; z-index: 20; background: white; border: 3px solid #1a4a9e; border-radius: 15px; padding: 15px; box-shadow: 0 6px 0 rgba(0,0,0,0.15); width: max-content;">
                <h3 style="margin-top: 0; font-family: sans-serif; color: #1a4a9e; font-size: 1.1rem; text-align: center;">¿Cuál es el precio correcto?</h3>
                <div class="lista-botones-precios" style="display: flex; gap: 10px; justify-content: center;">
                    <button class="btn-precio-tienda" onclick="verificarRespuestaAlmacen(5050, this)">$5.050</button>
                    <button class="btn-precio-tienda" onclick="verificarRespuestaAlmacen(5500, this)">$5.500</button>
                    <button class="btn-precio-tienda" onclick="verificarRespuestaAlmacen(5005, this)">$5.005</button>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: center; margin-top: 25px;">
            <button id="btnSig" class="btn-accion" style="display: none; background: #51cf66; font-size: 1.3rem; padding: 12px 25px; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #3b944c;" onclick="window.location.href='actividad4.html'">
                Siguiente Actividad ➡️
            </button>
        </div>
    </div>

    <script src="js/juego3.js"></script>
</body>
</html>
