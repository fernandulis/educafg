<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 4 - Ordenar Precios</title>
    <link rel="stylesheet" href="css/stylejuego4.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="js/juego4.js" defer></script>
</head>
<body>
    
    <div class="marcador-puntos-superior">
        ❤️ <span id="marcador-pts">0 Pts</span>
    </div>

    <div class="contenedor-principal">
        <h1 id="texto-karaoke" class="titulo-karaoke-ordenar" style="cursor: pointer;">
            <span class="palabra-normal">Los</span>
            <span class="palabra-normal">precios</span>
            <span class="palabra-normal">del</span>
            <span class="palabra-normal">mostrador</span>
            <span class="palabra-normal">se</span>
            <span class="palabra-normal">mezclaron.</span>
            <span class="palabra-normal">Ordena</span>
            <span class="palabra-normal">las</span>
            <span class="palabra-normal">tarjetas</span>
            <span class="palabra-normal">desde</span>
            <span class="palabra-normal">el</span>
            <span class="palabra-normal">artículo</span>
            <span class="palabra-normal">más</span>
            <span class="palabra-normal">barato</span>
            <span class="palabra-normal">al</span>
            <span class="palabra-normal">más</span>
            <span class="palabra-normal">caro.</span>
        </h1>

        <div class="zona-interactiva">
            <div class="caja-destino" data-solucion="1250" id="destino-barato">Más Barato</div>
            <div class="flecha-separadora">➡️</div>
            <div class="caja-destino" data-solucion="4700" id="destino-medio">Del Medio</div>
            <div class="flecha-separadora">➡️</div>
            <div class="caja-destino" data-solucion="9990" id="destino-caro">Más Caro</div>
        </div>

        <div class="banco-opciones" id="banco">
            <div class="elemento-arrastrable" draggable="true" id="p1" data-valor="9990" style="cursor: grab;">$9.990</div>
            <div class="elemento-arrastrable" draggable="true" id="p2" data-valor="1250" style="cursor: grab;">$1.250</div>
            <div class="elemento-arrastrable" draggable="true" id="p3" data-valor="4700" style="cursor: grab;">$4.700</div>
        </div>

        <div style="display: flex; justify-content: center; margin-top: 20px;">
            <button id="btnSig" class="btn-accion-sgte" style="display:none;" onclick="window.location.href='actividad5.html'">
                Siguiente Actividad ➡️
            </button>
        </div>
    </div>

</body>
</html>
