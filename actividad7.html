<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 7 - Tabla Posicional</title>
    <link rel="stylesheet" href="css/stylejuego7.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="js/juego7.js" defer></script>
</head>
<body>
    
    <div class="marcador-puntos-superior">
        ❤️ <span id="marcador-pts">0 Pts</span>
    </div>

    <div class="contenedor-principal">
        <h1 id="texto-karaoke" class="titulo-karaoke-posicional">
            <span class="palabra-normal">Mira</span>
            <span class="palabra-normal">la</span>
            <span class="palabra-normal">tabla</span>
            <span class="palabra-normal">posicional.</span>
            <span class="palabra-normal">¿Cuánto</span>
            <span class="palabra-normal">vale</span>
            <span class="palabra-normal">el</span>
            <span class="palabra-normal">dígito</span>
            <span class="palabra-normal">siete</span>
            <span class="palabra-normal">si</span>
            <span class="palabra-normal">se</span>
            <span class="palabra-normal">ubica</span>
            <span class="palabra-normal">en</span>
            <span class="palabra-normal">las</span>
            <span class="palabra-normal">unidades</span>
            <span class="palabra-normal">de</span>
            <span class="palabra-normal">mil?</span>
            <span class="palabra-normal">Arrastra</span>
            <span class="palabra-normal">la</span>
            <span class="palabra-normal">respuesta.</span>
        </h1>

        <table class="tabla-posicional">
            <thead>
                <tr>
                    <th class="col-um">UM</th>
                    <th class="col-c">C</th>
                    <th class="col-d">D</th>
                    <th class="col-u">U</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="destaque-siete">7</td>
                    <td>3</td>
                    <td>1</td>
                    <td>2</td>
                </tr>
            </tbody>
        </table>

        <p class="pregunta-guia">¿A cuánto equivale ese 7?</p>

        <div class="zona-caida-contenedor">
            <div class="caja-destino-posicional" id="zona-respuesta">?</div>
        </div>

        <div class="banco-valores" id="banco-opciones">
            <div class="valor-arrastrable" draggable="true" id="val-7" data-valor="7">7</div>
            <div class="valor-arrastrable" draggable="true" id="val-70" data-valor="70">70</div>
            <div class="valor-arrastrable" draggable="true" id="val-700" data-valor="700">700</div>
            <div class="valor-arrastrable" draggable="true" id="val-7000" data-valor="7.000">7.000</div>
        </div>

        <button id="btnSig" class="btn-accion-sgte" style="display:none;">
            ¡Siguiente Actividad! ➡️
        </button>
    </div>

</body>
</html>
