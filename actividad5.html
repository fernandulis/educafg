<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 5 - Comparar Precios</title>
    
    <link rel="stylesheet" href="css/stylejuego5.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="js/juego5.js" defer></script>
</head>
<body>
    
    <div class="marcador-puntos-superior">
        ❤️ <span id="marcador-pts">0 Pts</span>
    </div>

    <div class="contenedor-principal">
        <h1 id="texto-karaoke" class="titulo-karaoke-comparar">
            <span class="palabra-normal">Compara</span>
            <span class="palabra-normal">los</span>
            <span class="palabra-normal">precios</span>
            <span class="palabra-normal">de</span>
            <span class="palabra-normal">estos</span>
            <span class="palabra-normal">cuadernos.</span>
            <span class="palabra-normal">Ocho</span>
            <span class="palabra-normal">mil</span>
            <span class="palabra-normal">cuatrocientos</span>
            <span class="palabra-normal">veinte</span>
            <span class="palabra-normal">pesos</span>
            <span class="palabra-normal">es</span>
            <span class="palabra-normal">mayor</span>
            <span class="palabra-normal">o</span>
            <span class="palabra-normal">menor</span>
            <span class="palabra-normal">que</span>
            <span class="palabra-normal">ocho</span>
            <span class="palabra-normal">mil</span>
            <span class="palabra-normal">doscientos</span>
            <span class="palabra-normal">cuarenta</span>
            <span class="palabra-normal">pesos.</span>
            <span class="palabra-normal">Arrastra</span>
            <span class="palabra-normal">el</span>
            <span class="palabra-normal">signo</span>
            <span class="palabra-normal">correcto.</span>
        </h1>

        <div class="bloque-comparacion">
            <div class="precio-etiqueta">$8.420</div>
            
            <div class="caja-destino-signo" id="zona-signo">?</div>
            
            <div class="precio-etiqueta">$8.240</div>
        </div>

        <div class="banco-operadores" id="banco-signos">
            <div class="signo-arrastrable" draggable="true" id="signo-mayor" data-signo=">">&gt;</div>
            <div class="signo-arrastrable" draggable="true" id="signo-menor" data-signo="<">&lt;</div>
        </div>

        <button id="btnSig" class="btn-accion-sgte" style="display:none;">
            ¡Siguiente Actividad! ➡️
        </button>
    </div>

</body>
</html>
