<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 6 - La Recta Numérica</title>
    <link rel="stylesheet" href="css/stylejuego6.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="js/juego6.js" defer></script>
</head>
<body>
    
    <div class="marcador-puntos-superior">
        ❤️ <span id="marcador-pts">0 Pts</span>
    </div>

    <div class="contenedor-principal">
        <h1 id="texto-karaoke" class="titulo-karaoke-recta" style="cursor: pointer;">
            <span class="palabra-normal">Observa</span>
            <span class="palabra-normal">la</span>
            <span class="palabra-normal">recta</span>
            <span class="palabra-normal">numérica.</span>
            <span class="palabra-normal">Qué</span>
            <span class="palabra-normal">precio</span>
            <span class="palabra-normal">se</span>
            <span class="palabra-normal">ubica</span>
            <span class="palabra-normal">exactamente</span>
            <span class="palabra-normal">en</span>
            <span class="palabra-normal">la</span>
            <span class="palabra-normal">mitad</span>
            <span class="palabra-normal">de</span>
            <span class="palabra-normal">la</span>
            <span class="palabra-normal">recta</span>
            <span class="palabra-normal">entre</span>
            <span class="palabra-normal">el</span>
            <span class="palabra-normal">tres</span>
            <span class="palabra-normal">mil</span>
            <span class="palabra-normal">y</span>
            <span class="palabra-normal">el</span>
            <span class="palabra-normal">cuatro</span>
            <span class="palabra-normal">mil.</span>
            <span class="palabra-normal">Arrástralo.</span>
        </h1>

        <div class="bloque-recta">
            <div class="extremo-precio" style="cursor: pointer;" onclick="window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance('Tres mil'); m.lang='es-MX'; window.speechSynthesis.speak(m);">$3.000</div>
            
            <div class="linea-recta-interactiva">
                <div class="caja-destino-numero" id="zona-numero">?</div>
            </div>
            
            <div class="extremo-precio" style="cursor: pointer;" onclick="window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance('Cuatro mil'); m.lang='es-MX'; window.speechSynthesis.speak(m);">$4.000</div>
        </div>

        <div class="banco-numeros" id="banco-opciones">
            <div class="numero-arrastrable" draggable="true" id="num-3200" data-valor="3200" style="cursor: grab;">$3.200</div>
            <div class="numero-arrastrable" draggable="true" id="num-3500" data-valor="3500" style="cursor: grab;">$3.500</div>
            <div class="numero-arrastrable" draggable="true" id="num-3800" data-valor="3800" style="cursor: grab;">$3.800</div>
        </div>

        <div style="display: flex; justify-content: center; margin-top: 20px;">
            <button id="btnSig" class="btn-accion-sgte" style="display:none;">
                ¡Siguiente Desafío! ➡️
            </button>
        </div>
    </div>

</body>
</html>
